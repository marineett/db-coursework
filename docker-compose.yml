version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mydb
      POSTGRES_CLIENT_MIN_MESSAGES: notice
      POSTGRES_LOG_MIN_MESSAGES: notice
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: mydb
      DATABASE_USER: user
      DATABASE_PASSWORD: pass
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
      - ./logs:/app/logs
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_APP_BACKEND_URL=http://backend:8000
      - WDS_SOCKET_PORT=3000
      - NODE_OPTIONS=--openssl-legacy-provider
      - CI=true
      - NPM_CONFIG_LOGLEVEL=warn
    command: sh -c "mkdir -p logs && npm start 2>&1 | tee logs/frontend.log"
    stdin_open: true
    tty: true
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    name: app-network

volumes:
  db_data: