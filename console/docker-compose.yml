version: '3.8'

services:
  db:
    image: postgres:12
    environment:
      POSTGRES_DB: data_base_project_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: