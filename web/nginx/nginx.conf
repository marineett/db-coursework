worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    gzip on;

    upstream app {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index static/index.html index.html index.htm;

        location = /status/raw {
            stub_status on;
            access_log off;
        }

        location = /status {
            try_files /status.html =404;
        }

        location = /status.css {
            root /usr/share/nginx/html;
            access_log off;
            add_header Cache-Control "no-store, must-revalidate";
            default_type text/css;
        }

        location = /status.js {
            root /usr/share/nginx/html;
            access_log off;
            add_header Cache-Control "no-store, must-revalidate";
        }

        location = /documentation {
            try_files /documentation.html =404;
            charset utf-8;
            default_type text/html;
            add_header Content-Type "text/html; charset=utf-8";
        }

                # Handle exact /legacy internally as /legacy/ so both URLs behave the same
        location = /legacy {
            rewrite ^ /legacy/ last;
        }

        # Proxy all /legacy/ requests to backend /api/v2/legacy/ preserving subpaths
        location /legacy/ {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;

            proxy_pass http://app/api/v2/legacy/;
            proxy_redirect /api/v2/legacy/ /legacy/;
        }


        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;

            proxy_pass http://app;
        }

        location /admin {
            proxy_pass http://adminer:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        location = /managment {
            try_files /managment.html =404;
        }

        location /reserved/ {
            try_files $uri $uri/ /static/index.html;
        }

        location = / {
            try_files /static/index.html =404;
        }

        location / {
            try_files $uri $uri/ /static/index.html =404;
        }
    }
}