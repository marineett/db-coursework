openapi: 3.0.1
info:
  title: Tutoring Platform
  version: 1.0.0
servers:
  - url: http://127.0.0.1:80/api/v2

tags:
  - name: Auth
    description: Авторизация и регистрация
  - name: Client
    description: Профили клиентов
  - name: Repetitor
    description: Профили репетиторов
  - name: Chat
    description: Управление чатами
  - name: Message
    description: Управление сообщениями
  - name: Contract
    description: Контракты и их подресурсы
  - name: Lesson
    description: Уроки в рамках контракта
  - name: Review
    description: Отзывы по контрактам
  - name: Transaction
    description: Платежи и модерация
  - name: Admin
    description: Операции администратора
  - name: Department
    description: Управление отделами
  - name: Moderator
    description: Управление модераторами
  - name: Legacy
    description: Доступ к архивам
  - name: Management
    description: Управление и навигация по API

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    AuthRequest:
      type: object
      required: [login, password]
      properties:
        login: { type: string }
        password: { type: string, format: password }

    AuthResponse:
      type: object
      required: [token, role, user_id]
      properties:
        token: { type: string, description: JWT }
        role:
          { type: string, enum: [guest, client, repetitor, moderator, admin] }
        user_id: { type: integer, format: int64 }

    UserRegister:
      type: object
      required:
        [first_name, last_name, email, login, password, telephone_number, role]
      properties:
        first_name: { type: string }
        last_name: { type: string }
        middle_name: { type: string }
        email: { type: string, format: email }
        telephone_number: { type: string }
        login: { type: string }
        password: { type: string, format: password }
        role:
          {
            type: string,
            enum: [client, repetitor, moderator, admin],
            description: "Роль пользователя при регистрации",
          }
        resume: { type: string, description: "Резюме (только для репетиторов)" }
        salary:
          {
            type: integer,
            format: int64,
            description: "Зарплата (только для модераторов и администраторов)",
          }

    ClientProfile:
      type: object
      required: [id, first_name, last_name, email, telephone_number]
      properties:
        id: { type: integer, format: int64 }
        first_name: { type: string }
        last_name: { type: string }
        middle_name: { type: string }
        email: { type: string, format: email }
        telephone_number: { type: string }
        rating: { type: number, format: float, nullable: true }

    RepetitorProfile:
      type: object
      required: [id, first_name, last_name, email, telephone_number]
      properties:
        id: { type: integer, format: int64 }
        first_name: { type: string }
        last_name: { type: string }
        middle_name: { type: string }
        email: { type: string, format: email }
        telephone_number: { type: string }
        resume: { type: string, nullable: true }
        rating: { type: number, format: float, nullable: true }

    Chat:
      type: object
      required: [id, type, created_at]
      properties:
        id: { type: integer, format: int64 }
        type:
          {
            type: string,
            enum: [client-moderator, client-repetitor, repetitor-moderator],
          }
        client_id: { type: integer, format: int64, nullable: true }
        repetitor_id: { type: integer, format: int64, nullable: true }
        moderator_id: { type: integer, format: int64, nullable: true }
        status: { type: string, enum: [active, closed], default: active }
        created_at: { type: string, format: date-time }

    ChatCreate:
      type: object
      required: [type]
      properties:
        type:
          {
            type: string,
            enum: [client-moderator, client-repetitor, repetitor-moderator],
          }
        client_id: { type: integer, format: int64 }
        repetitor_id: { type: integer, format: int64 }
        moderator_id: { type: integer, format: int64 }

    ChatUpdate:
      type: object
      required: [type, status]
      properties:
        type:
          {
            type: string,
            enum: [client-moderator, client-repetitor, repetitor-moderator],
          }
        status: { type: string, enum: [active, closed] }

    ChatStatusPatch:
      type: object
      properties:
        status: { type: string, enum: [active, closed] }

    Message:
      type: object
      required: [id, sender_id, content, created_at]
      properties:
        id: { type: integer, format: int64 }
        sender_id: { type: integer, format: int64 }
        content: { type: string }
        created_at: { type: string, format: date-time }

    MessageCreate:
      type: object
      required: [content, senderId]
      properties:
        content: { type: string }
        senderId: { type: integer, format: int64 }

    MessageContentPatch:
      type: object
      required: [content]
      properties:
        content: { type: string }

    Contract:
      type: object
      required: [id, client_id, description, rate, status, format, created_at]
      properties:
        id: { type: integer, format: int64 }
        client_id: { type: integer, format: int64 }
        repetitor_id: { type: integer, format: int64, nullable: true }
        description: { type: string }
        rate: { type: integer, description: "ставка за урок (руб.)" }
        format: { type: string, enum: [online, offline] }
        status:
          { type: string, enum: [review, active, completed, cancelled, banned] }
        created_at: { type: string, format: date-time }

    ContractCreate:
      type: object
      required: [client_id, description, rate, format]
      properties:
        client_id: { type: integer, format: int64 }
        description: { type: string }
        rate: { type: integer, minimum: 500, maximum: 10000 }
        format: { type: string, enum: [online, offline] }

    ContractStatusPatch:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [active, completed, cancelled] }

    Lesson:
      type: object
      required: [id, contract_id, duration_min, format, created_at]
      properties:
        id: { type: integer, format: int64 }
        contract_id: { type: integer, format: int64 }
        duration_min: { type: integer, minimum: 15 }
        format: { type: string, enum: [online, offline] }
        created_at: { type: string, format: date-time }

    LessonCreate:
      type: object
      required: [duration_min, format]
      properties:
        duration_min: { type: integer, minimum: 15 }
        format: { type: string, enum: [online, offline] }

    LessonPatch:
      type: object
      properties:
        duration_min: { type: integer, minimum: 15 }
        format: { type: string, enum: [online, offline] }

    Review:
      type: object
      required:
        [id, contract_id, from_user_id, to_user_id, score, text, created_at]
      properties:
        id: { type: integer, format: int64 }
        contract_id: { type: integer, format: int64 }
        from_user_id: { type: integer, format: int64 }
        to_user_id: { type: integer, format: int64 }
        score: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string }
        created_at: { type: string, format: date-time }

    ReviewCreate:
      type: object
      required: [score, text, senderId]
      properties:
        score: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string }
        senderId: { type: integer, format: int64 }

    Transaction:
      type: object
      required: [id, contract_id, amount, status, created_at]
      properties:
        id: { type: integer, format: int64 }
        contract_id: { type: integer, format: int64 }
        amount: { type: integer }
        status: { type: string, enum: [pending, confirmed, rejected] }
        created_at: { type: string, format: date-time }

    TransactionCreate:
      type: object
      required: [amount]
      properties:
        amount: { type: integer, minimum: 1 }

    TransactionApprove:
      type: object
      properties:
        approved: { type: boolean, default: true }

    ServerAdminProfile:
      type: object
      required:
        [first_name, last_name, middle_name, telephone_number, email, salary]
      properties:
        first_name: { type: string }
        last_name: { type: string }
        middle_name: { type: string }
        telephone_number: { type: string }
        email: { type: string, format: email }
        salary: { type: integer, format: int64 }

    ServerModeratorProfile:
      type: object
      required:
        [
          first_name,
          last_name,
          middle_name,
          telephone_number,
          email,
          salary,
          departments,
        ]
      properties:
        first_name: { type: string }
        last_name: { type: string }
        middle_name: { type: string }
        telephone_number: { type: string }
        email: { type: string, format: email }
        salary: { type: integer, format: int64 }
        departments:
          type: array
          items: { type: string }

    ServerModeratorProfileWithID:
      type: object
      required: [id, moderator]
      properties:
        id: { type: integer, format: int64 }
        moderator: { $ref: "#/components/schemas/ServerModeratorProfile" }

    ServerDepartment:
      type: object
      required: [id, name, head_id, moderators]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        head_id: { type: integer, format: int64 }
        moderators:
          type: array
          items: { $ref: "#/components/schemas/ServerModeratorProfileWithID" }

    DepartmentCreate:
      type: object
      required: [name, head_id]
      properties:
        name: { type: string }
        head_id: { type: integer, format: int64 }

    DepartmentNameUpdate:
      type: object
      required: [name]
      properties:
        name: { type: string }

    ModeratorSalaryPatch:
      type: object
      required: [salary]
      properties:
        salary: { type: integer, format: int64, minimum: 0 }

  responses:
    BadRequest:
      description: Bad request — invalid input
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            invalid_params:
              {
                value:
                  {
                    code: "bad_request",
                    message: "Invalid request parameters",
                  },
              }
            invalid_body:
              {
                value: { code: "bad_request", message: "Invalid request body" },
              }

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            no_token:
              {
                value:
                  {
                    code: "unauthorized",
                    message: "Authorization token is missing",
                  },
              }
            bad_token:
              { value: { code: "unauthorized", message: "Token is invalid" } }
            token_expired:
              { value: { code: "unauthorized", message: "Token expired" } }

    Forbidden:
      description: Forbidden — permission denied
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            not_participant:
              {
                value:
                  {
                    code: "forbidden",
                    message: "User is not a participant of this chat",
                  },
              }
            not_moderator:
              {
                value:
                  { code: "forbidden", message: "Moderator role required" },
              }
            not_head:
              {
                value:
                  {
                    code: "forbidden",
                    message: "Department head role required",
                  },
              }

    NotFoundChat:
      description: Chat not found
      content:
        {
          application/json:
            {
              schema: { $ref: "#/components/schemas/Error" },
              examples:
                {
                  chat_nf:
                    { value: { code: "not_found", message: "Chat not found" } },
                },
            },
        }
    NotFoundMessage:
      description: Message not found
      content:
        {
          application/json:
            {
              schema: { $ref: "#/components/schemas/Error" },
              examples:
                {
                  msg_nf:
                    {
                      value:
                        { code: "not_found", message: "Message not found" },
                    },
                },
            },
        }
    NotFoundDepartment:
      description: Department not found
      content:
        {
          application/json:
            {
              schema: { $ref: "#/components/schemas/Error" },
              examples:
                {
                  dept_nf:
                    {
                      value:
                        { code: "not_found", message: "Department not found" },
                    },
                },
            },
        }
    NotFoundProfile:
      description: Profile not found
      content:
        {
          application/json:
            {
              schema: { $ref: "#/components/schemas/Error" },
              examples:
                {
                  profile_nf:
                    {
                      value:
                        { code: "not_found", message: "Profile not found" },
                    },
                },
            },
        }
    NotFoundContract:
      description: Contract not found
      content:
        {
          application/json:
            {
              schema: { $ref: "#/components/schemas/Error" },
              examples:
                {
                  contract_nf:
                    {
                      value:
                        { code: "not_found", message: "Contract not found" },
                    },
                },
            },
        }
    NotFoundTransaction:
      description: Transaction not found
      content:
        {
          application/json:
            {
              schema: { $ref: "#/components/schemas/Error" },
              examples:
                {
                  tx_nf:
                    {
                      value:
                        { code: "not_found", message: "Transaction not found" },
                    },
                },
            },
        }
    NotFoundLesson:
      description: Lesson not found
      content:
        {
          application/json:
            {
              schema: { $ref: "#/components/schemas/Error" },
              examples:
                {
                  lesson_nf:
                    {
                      value: { code: "not_found", message: "Lesson not found" },
                    },
                },
            },
        }
    NotFoundReview:
      description: Review not found
      content:
        {
          application/json:
            {
              schema: { $ref: "#/components/schemas/Error" },
              examples:
                {
                  review_nf:
                    {
                      value: { code: "not_found", message: "Review not found" },
                    },
                },
            },
        }

    ConflictChatExists:
      description: Conflict — chat already exists for these participants
      content:
        {
          application/json:
            {
              schema: { $ref: "#/components/schemas/Error" },
              examples:
                {
                  chat_exists:
                    {
                      value:
                        {
                          code: "conflict",
                          message: "Chat already exists for these participants",
                        },
                    },
                },
            },
        }
    ConflictDepartmentNameTaken:
      description: Conflict — department name already in use
      content:
        {
          application/json:
            {
              schema: { $ref: "#/components/schemas/Error" },
              examples:
                {
                  name_taken:
                    {
                      value:
                        {
                          code: "conflict",
                          message: "Department name already in use",
                        },
                    },
                },
            },
        }
    ConflictModeratorAlreadyInDepartment:
      description: Conflict — moderator already in department
      content:
        {
          application/json:
            {
              schema: { $ref: "#/components/schemas/Error" },
              examples:
                {
                  mod_exists:
                    {
                      value:
                        {
                          code: "conflict",
                          message: "Moderator already assigned to this department",
                        },
                    },
                },
            },
        }

    ServerError:
      description: Internal server error
      content:
        {
          application/json:
            {
              schema: { $ref: "#/components/schemas/Error" },
              examples:
                {
                  err:
                    {
                      value:
                        {
                          code: "server_error",
                          message: "Unexpected server error",
                        },
                    },
                },
            },
        }

paths:
  /legacy:
    get:
      tags: [Legacy]
      summary: Скачать заархивированную папку console2
      operationId: downloadLegacyConsole2
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Успешная загрузка архива
          content:
            application/zip:
              schema:
                type: string
                format: binary
              description: ZIP архив с папкой console2
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Архив не найден
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /:
    get:
      tags: [Docs]
      summary: Отдать статический файл по умолчанию
      description: При отсутствии имени файла возвращает class_diagram.png
      operationId: getRootStaticDefault
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            image/png:
              schema:
                type: string
                format: binary
        "404":
          description: Not Found

  /api/v2:
    servers:
      - url: http://127.0.0.1:80/
    get:
      tags: [Docs]
      summary: OpenAPI спецификация (api/v2)
      operationId: getOpenAPISpecApiV2
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/yaml:
              schema:
                type: string
        "404":
          description: Not Found
  /static/documentation:
    get:
      tags: [Docs]
      summary: README документация
      operationId: getDocumentation
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            text/html:
              schema:
                type: string
                format: html
        "404":
          description: Not Found

  /management:
    get:
      tags: [Management]
      summary: API Management - страница со ссылками на все endpoints
      description: Возвращает HTML страницу с навигацией по всем доступным API endpoints для управления и просмотра документации
      operationId: getManagement
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            text/html:
              schema:
                type: string
                format: html
        "401": { $ref: "#/components/responses/Unauthorized" }

  /static:
    get:
      tags: [Docs]
      summary: Отдать статический файл по умолчанию
      description: При отсутствии имени файла возвращает class_diagram.png
      operationId: getStaticDefault
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            image/png:
              schema:
                type: string
                format: binary
        "404":
          description: Not Found

  /static/{filename}:
    get:
      tags: [Docs]
      summary: Отдать статический файл
      operationId: getStaticFile
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: filename
          required: true
          schema:
            type: string
          description: Имя файла; префикс @ допускается
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not Found

  /reserved:
    get:
      tags: [Docs]
      summary: Отдать зарезервированный статический файл по умолчанию
      description: При отсутствии имени файла возвращает class_diagram.png
      operationId: getReservedDefault
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            image/png:
              schema:
                type: string
                format: binary
        "404":
          description: Not Found

  /reserved/{filename}:
    get:
      tags: [Docs]
      summary: Отдать файл из reserved
      operationId: getReservedFile
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: filename
          required: true
          schema:
            type: string
          description: Имя файла; префикс @ допускается
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not Found
  /auth/login:
    post:
      tags: [Auth]
      summary: Авторизация пользователя (JWT)
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuthRequest" }
            examples:
              admin:
                summary: Авторизация администратора
                value:
                  login: "admin_user"
                  password: "password123"
              client:
                summary: Авторизация клиента
                value:
                  login: "client_user"
                  password: "password123"
      responses:
        "200":
          description: Успешная авторизация
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
              examples:
                success:
                  summary: Успешная авторизация
                  value:
                    token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    role: "admin"
                    user_id: 123
        "401": { $ref: "#/components/responses/Unauthorized" }

  /registration:
    post:
      tags: [Auth]
      summary: Регистрация пользователя (client, repetitor, moderator, admin)
      operationId: registerUser
      description: Роль (client, repetitor, moderator, admin).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserRegister" }
            examples:
              client:
                summary: Регистрация клиента
                value:
                  first_name: "Иван"
                  last_name: "Иванов"
                  middle_name: "Иванович"
                  email: "ivan@example.com"
                  telephone_number: "+79001234567"
                  login: "ivan_client"
                  password: "securePassword123"
                  role: "client"
              repetitor:
                summary: Регистрация репетитора
                value:
                  first_name: "Мария"
                  last_name: "Петрова"
                  middle_name: "Сергеевна"
                  email: "maria@example.com"
                  telephone_number: "+79007654321"
                  login: "maria_tutor"
                  password: "securePassword456"
                  role: "repetitor"
                  resume: "Опыт преподавания математики 5 лет, кандидат наук"
              moderator:
                summary: Регистрация модератора
                value:
                  first_name: "Алексей"
                  last_name: "Смирнов"
                  middle_name: "Петрович"
                  email: "alexey@example.com"
                  telephone_number: "+79009876543"
                  login: "alexey_mod"
                  password: "securePassword789"
                  role: "moderator"
                  salary: 50000
              admin:
                summary: Регистрация администратора
                value:
                  first_name: "Екатерина"
                  last_name: "Волкова"
                  middle_name: "Дмитриевна"
                  email: "ekaterina@example.com"
                  telephone_number: "+79005555555"
                  login: "ekaterina_admin"
                  password: "securePassword000"
                  role: "admin"
                  salary: 80000
      responses:
        "201":
          description: Успешная регистрация
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
              examples:
                success:
                  summary: Успешная регистрация
                  value:
                    token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    role: "admin"
                    user_id: 123
        "400": { $ref: "#/components/responses/BadRequest" }
        "409":
          description: Conflict — login or email already exists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                login_taken:
                  {
                    value:
                      { code: "conflict", message: "Login already in use" },
                  }
                email_taken:
                  {
                    value:
                      { code: "conflict", message: "Email already in use" },
                  }

